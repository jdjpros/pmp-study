<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP 학습 뷰어</title>
<style>
  :root {
    --bg: #e6ebf5; --card: #ffffff; --border: #c3cce2; --accent: #3b6fd4; --accent2: #6c5ce7;
    --correct: #16a34a; --wrong: #dc2626; --warn: #d97706; --text: #1e2433; --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.7; }

  /* ── 어플리케이션 타이틀 ── */
  .app-header { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #fff;
                padding: 12px 20px; display: flex; align-items: center; gap: 8px; }
  .app-title { font-size: 1.05rem; font-weight: 800; letter-spacing: .02em; }

  /* ── 상단 네비게이션: 단원 이동 (요구사항 6) ──
     단원 수가 많아 가로로 나열하면 폭이 너무 길어지므로,
     드롭박스(select)로 단원을 선택해 바로 이동하는 방식으로 변경 */
  .unit-nav { position: sticky; top: 0; z-index: 50; background: #fbfcfe; border-bottom: 1px solid var(--border);
              padding: 12px 20px; display: flex; gap: 10px; align-items: center; box-shadow: 0 2px 8px rgba(30,40,80,.06); }
  .unit-nav .nav-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; flex: 0 0 auto; }
  .unit-select { flex: 1 1 auto; max-width: 560px; background: #fff; color: var(--text); border: 1px solid var(--border);
                 border-radius: 10px; padding: 8px 36px 8px 14px; font-size: 0.85rem; cursor: pointer; appearance: none;
                 -webkit-appearance: none; transition: .15s;
                 background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
                 background-repeat: no-repeat; background-position: right 12px center; }
  .unit-select:hover { border-color: var(--accent); }
  .unit-select:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(108,92,231,.15); }
  .unit-select-current { font-size: 0.78rem; color: var(--muted); white-space: nowrap; flex: 0 0 auto; }

  .wrap { max-width: min(1400px, 96vw); margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; }

  /* ── 단원 제목 영역 — 스크롤하면 자연스럽게 올라가는 일반 콘텐츠 ── */
  .unit-info { padding: 24px 0 16px; }
  .unit-info h1 { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .unit-info .subtitle { font-size: 0.88rem; color: var(--muted); }

  /* ── 진행률 + 점프 인덱스 고정 바 — 항상 compact, 접힘/펼침 없음 ── */
  .sticky-head { position: sticky; top: var(--nav-height, 52px); z-index: 45;
                 background: var(--bg); padding: 6px 0 0;
                 border-bottom: 1px solid var(--border);
                 box-shadow: 0 2px 8px rgba(30,40,80,.07); }
  .sticky-head .progress-wrap { margin-bottom: 6px; font-size: 0.75rem; }
  .sticky-head .jump-btn { width: 26px; height: 26px; min-width: 26px; font-size: 0.68rem; border-radius: 5px; }
  .sticky-head .jump-index { padding: 4px 32px; gap: 5px; }
  .sticky-head .jlabel { display: none; }

  /* 학습 모드 토글 버튼 */
  .study-mode-btn { margin-left: 4px; background: transparent; border: 1px solid var(--border);
                    border-radius: 6px; padding: 3px 9px; font-size: 0.7rem; color: var(--muted);
                    cursor: pointer; transition: .15s; white-space: nowrap; flex: 0 0 auto; }
  .study-mode-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .study-mode-btn.active { background: rgba(108,92,231,.12); border-color: var(--accent2);
                           color: var(--accent2); font-weight: 700; }

  /* 학습 모드 ON: 개념 모듈을 선지 위(q-body 앞)로 올리기 */
  body.study-mode .q-card { display: flex; flex-direction: column; }
  body.study-mode .q-card > .q-header   { order: 0; }
  body.study-mode .q-card > .concept-module {
    order: 1; display: block;
    margin: 0 18px 4px; border-style: solid;
  }
  body.study-mode .q-card > .q-body     { order: 2; }

  .loading, .error-box { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.95rem; }
  .error-box { color: var(--wrong); }

  /* ── 진행 표시 ── */
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; font-size: 0.8rem; color: var(--muted); }
  .reset-all-btn { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px;
                   padding: 5px 12px; font-size: 0.76rem; cursor: pointer; transition: .15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .reset-all-btn:hover { border-color: var(--wrong); color: var(--wrong); background: rgba(239,68,68,.06); }
  .progress-bar { flex: 1; height: 6px; background: #d3dbed; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width .3s; }

  /* ── 언어 모드 토글 버튼 ── */
  .lang-btn-wrap { display: flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; flex: 0 0 auto; }
  .lang-btn { background: transparent; border: none; padding: 3px 9px; font-size: 0.7rem; color: var(--muted);
              cursor: pointer; transition: .15s; white-space: nowrap; }
  .lang-btn.active { background: var(--accent); color: #fff; font-weight: 700; }
  .lang-btn:not(.active):hover { background: rgba(91,141,238,.1); color: var(--accent); }

  /* 한글 전용 모드: 영어 지문/선지/원문해설 숨김 */
  body.ko-only .bilingual .en,
  body.ko-only .choice-text .en,
  body.ko-only .solution-box .original-en { display: none; }

  /* ── 문제 점프 인덱스 (F10) ──
     세로 폭을 줄이기 위해 한 줄로 표시한다. (.sticky-head가 통째로 고정되므로 별도 sticky는 불필요)
     좌우 끝에 마우스를 올리면 자동으로 스크롤되는 "엣지 호버" 방식 — 스크롤바는 숨김 */
  .jump-index-wrap { position: relative; }
  .jump-index { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; padding: 12px 38px;
                background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 1px 6px rgba(30,40,80,.07);
                overflow-x: auto; overflow-y: hidden; scroll-behavior: auto;
                scrollbar-width: none; -ms-overflow-style: none; }
  .jump-index::-webkit-scrollbar { display: none; }
  .jump-index .jlabel { font-size: 0.75rem; color: var(--muted); margin-right: 4px; white-space: nowrap; flex: 0 0 auto; }
  /* 좌/우 끝 호버 영역 — 마우스를 올리면 해당 방향으로 자동 스크롤 */
  .jump-edge { position: absolute; top: 0; bottom: 0; width: 38px; display: flex; align-items: center; justify-content: center;
               cursor: pointer; color: var(--muted); font-size: 1rem; z-index: 2; opacity: 0; transition: opacity .15s; border-radius: 10px; }
  .jump-edge.left { left: 0; background: linear-gradient(90deg, var(--card) 35%, rgba(255,255,255,0)); justify-content: flex-start; padding-left: 8px; }
  .jump-edge.right { right: 0; background: linear-gradient(270deg, var(--card) 35%, rgba(255,255,255,0)); justify-content: flex-end; padding-right: 8px; }
  .jump-index-wrap:hover .jump-edge { opacity: 1; }
  .jump-edge:hover { color: var(--accent2); }
  .jump-edge.disabled { opacity: 0 !important; pointer-events: none; }
  .jump-btn { width: 34px; height: 34px; min-width: 34px; border-radius: 7px; border: 1px solid var(--border); background: #eef1f8;
              color: var(--muted); font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: .15s; position: relative; flex: 0 0 auto; }
  .jump-btn:hover { border-color: var(--accent); color: var(--text); }
  .jump-btn.done { background: rgba(34,197,94,.12); border-color: var(--correct); color: var(--correct); }
  .jump-btn.bookmarked::after { content: "★"; font-size: 0.6rem; position: absolute; top: -6px; right: -4px; color: var(--warn); }
  /* 안내 문구는 가로 스크롤 줄 밖으로 빼서 별도 줄에 표시 (스크롤 영역 폭을 차지하지 않도록) */
  .jump-hint { display: block; font-size: 0.7rem; color: var(--muted); margin-top: 6px; padding: 0 4px; text-align: right; }

  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 28px; overflow: hidden; scroll-margin-top: var(--scroll-offset, 170px); box-shadow: 0 2px 12px rgba(30,40,80,.08); }
  .q-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: #e9eef8; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .q-num { background: var(--accent2); color: #fff; font-weight: 700; border-radius: 6px; padding: 2px 10px; font-size: 0.85rem; }
  .multi-tag { background: var(--warn); color: #000; font-size: 0.75rem; font-weight: 700; border-radius: 4px; padding: 2px 8px; }
  .q-status { font-size: 0.78rem; color: var(--muted); }
  .q-body { padding: 18px; }
  .bilingual { margin-bottom: 18px; }
  .en { color: var(--muted); font-size: 0.88rem; margin-bottom: 4px; }
  .ko { color: var(--text); font-size: 0.97rem; }
  .label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 4px; display: block; }

  /* ── 선택지: 클릭 전에는 정답/오답 표시 없음 (요구사항 1) ── */
  .choices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
  .choice { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .choice:hover:not(.revealed) { border-color: var(--accent); box-shadow: 0 1px 6px rgba(59,111,212,.12); }
  .choice-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f4f6fb; }
  .badge { font-weight: 700; font-size: 0.85rem; min-width: 24px; color: var(--muted); }
  .choice-text { flex: 1; }
  .choice-text .en { margin-bottom: 2px; }
  .reveal-hint { font-size: 0.72rem; color: var(--muted); opacity: .7; white-space: nowrap; }
  .mark { font-weight: 700; font-size: 1rem; display: none; min-width: 22px; text-align: center; }

  /* 클릭(공개) 후 상태 (요구사항 2) */
  .choice.revealed { cursor: default; }
  .choice.revealed.is-correct { border-color: var(--correct); }
  .choice.revealed.is-correct .choice-header { background: rgba(34,197,94,.08); }
  .choice.revealed.is-correct .mark { display: inline-block; color: var(--correct); }
  .choice.revealed.is-correct .mark::before { content: "✅"; }
  .choice.revealed.is-wrong .mark { display: inline-block; color: var(--wrong); }
  .choice.revealed.is-wrong .mark::before { content: "❌"; }
  .choice.revealed .reveal-hint { display: none; }

  .exp-content { display: none; padding: 12px 14px; font-size: 0.88rem; line-height: 1.65; border-top: 1px solid var(--border); }
  .choice.revealed .exp-content { display: block; animation: fadeIn .25s ease; }
  .exp-content.correct-exp { border-left: 3px solid var(--correct); padding-left: 12px; }
  .exp-content.wrong-exp { border-left: 3px solid var(--wrong); padding-left: 12px; color: #4b5468; }
  @keyframes fadeIn { from {opacity:0; transform: translateY(-4px);} to {opacity:1; transform: translateY(0);} }

  /* ── 모든 지문 클릭 후 등장하는 원문 해설 (요구사항 3) ── */
  .answer-bar { padding: 10px 18px; background: #eef9f1; border-top: 1px solid var(--border); font-size: 0.85rem;
                color: var(--correct); font-weight: 600; display: none; }
  .answer-bar.show { display: block; animation: fadeIn .3s ease; }
  .solution-box { margin-top: 18px; background: #eef1fb; border: 1px solid #c7cfe6; border-radius: 8px; padding: 14px 16px;
                  font-size: 0.87rem; display: none; animation: fadeIn .3s ease; }
  .solution-box.show { display: block; }
  .solution-box .stitle { font-weight: 700; color: var(--accent); font-size: 0.8rem; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
  .solution-box .original-en { color: var(--muted); margin-bottom: 8px; }
  .solution-box .original-ko { color: var(--text); margin-bottom: 10px; }
  .source { font-size: 0.78rem; color: var(--accent2); }

  /* ── 추가 개념정리 모듈 영역 (요구사항 5) — 모든 지문을 확인해야 펼쳐짐 (Top-Down 학습: 풀고 → 개념학습) ── */
  .concept-module { margin: 0 18px 18px; border: 1px dashed var(--accent2); border-radius: 10px; padding: 16px 18px; background: rgba(124,106,245,.05);
                    display: none; }
  .concept-module.show { display: block; animation: fadeIn .3s ease; }
  .concept-module .ctitle { font-weight: 700; color: var(--accent2); font-size: 0.85rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .concept-module .cbody { font-size: 0.85rem; color: #3a4358; }
  .concept-module .cbody > *:last-child { margin-bottom: 0; }
  .concept-placeholder { font-size: 0.8rem; color: var(--muted); font-style: italic; }
  .concept-block { margin-bottom: 18px; }
  .concept-block:last-child { margin-bottom: 0; }
  .concept-block-title { font-weight: 700; color: var(--accent2); font-size: 0.92rem; margin-bottom: 8px; }

  /* 개념정리 — 리치 콘텐츠 컴포넌트 (part1_basics.html 스타일을 다크테마로 이식) */
  .c-p { margin-bottom: 10px; line-height: 1.7; color: #3a4358; }
  .c-h4 { font-size: 0.86rem; font-weight: 700; color: var(--text); margin: 14px 0 6px; }
  .c-kw { font-weight: 700; color: var(--accent); }
  .c-kw-r { font-weight: 700; color: var(--wrong); }
  .c-kw-g { font-weight: 700; color: var(--correct); }
  .c-kw-p { font-weight: 700; color: var(--accent2); }

  .c-def-box { background: #f3f5fb; border: 1.5px solid var(--accent); border-radius: 8px; padding: 12px 16px; margin: 10px 0; }
  .c-def-box::before { content: "📖 핵심 정의"; display: block; font-size: 0.68rem; font-weight: 700; color: var(--accent);
                       text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .c-def-box .c-term { font-size: 0.92rem; font-weight: 700; color: var(--text); }
  .c-def-box .c-term-en { font-size: 0.76rem; color: var(--muted); margin-left: 6px; font-weight: 400; }
  .c-def-box .c-def-text { margin-top: 5px; color: #3a4358; font-size: 0.85rem; }

  .c-box { border-radius: 8px; padding: 12px 16px; margin: 10px 0; display: flex; gap: 10px; }
  .c-box-icon { font-size: 1.1rem; flex-shrink: 0; }
  .c-box-content { flex: 1; }
  .c-box-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .c-box-body { font-size: 0.84rem; color: #3a4358; line-height: 1.65; }
  .c-box.tip     { background: rgba(91,141,238,.08);  border: 1px solid var(--accent); }
  .c-box.tip     .c-box-title { color: var(--accent); }
  .c-box.warning { background: rgba(245,158,11,.08);  border: 1px solid var(--warn); }
  .c-box.warning .c-box-title { color: var(--warn); }
  .c-box.exam    { background: rgba(124,106,245,.08); border: 1px solid var(--accent2); }
  .c-box.exam    .c-box-title { color: var(--accent2); }
  .c-box.memo    { background: rgba(34,197,94,.08);   border: 1px solid var(--correct); }
  .c-box.memo    .c-box-title { color: var(--correct); }

  /* ── 누락 컴포넌트: c-section / c-two-col / c-card / c-tag / c-callout ── */
  .c-section { margin: 14px 0; }
  .c-section h2 { font-size: 1rem; font-weight: 700; color: var(--accent2); margin: 0 0 8px;
                  padding-bottom: 4px; border-bottom: 2px solid rgba(108,92,231,.2); }
  .c-section h3 { font-size: 0.88rem; font-weight: 700; color: var(--text); margin: 10px 0 6px; }
  .c-section ul { padding-left: 18px; margin: 4px 0 8px; }
  .c-section li { font-size: 0.84rem; color: #3a4358; line-height: 1.7; margin-bottom: 2px; }

  .c-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0; }
  .c-card { background: #f3f5fb; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .c-card h3 { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin: 0 0 8px;
               padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .c-card ul { padding-left: 16px; margin: 0; }
  .c-card li { font-size: 0.82rem; color: #3a4358; line-height: 1.65; margin-bottom: 2px; }

  .c-callout { border-radius: 8px; padding: 10px 14px; margin: 10px 0; font-size: 0.82rem; line-height: 1.65; }
  .c-callout--blue   { background: rgba(59,111,212,.08);  border-left: 3px solid var(--accent);  color: #1e3a6e; }
  .c-callout--green  { background: rgba(22,163,74,.08);   border-left: 3px solid var(--correct); color: #14532d; }
  .c-callout--orange { background: rgba(217,119,6,.08);   border-left: 3px solid var(--warn);   color: #78350f; }
  .c-callout--purple { background: rgba(108,92,231,.08);  border-left: 3px solid var(--accent2); color: #3b1f6e; }
  .c-callout--red    { background: rgba(220,38,38,.08);   border-left: 3px solid var(--wrong);  color: #7f1d1d; }

  .c-tag { display: inline-block; border-radius: 4px; padding: 1px 7px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; }
  .c-tag--blue   { background: rgba(59,111,212,.12);  color: var(--accent); }
  .c-tag--green  { background: rgba(22,163,74,.12);   color: var(--correct); }
  .c-tag--orange { background: rgba(217,119,6,.12);   color: var(--warn); }
  .c-tag--purple { background: rgba(108,92,231,.12);  color: var(--accent2); }
  .c-tag--red    { background: rgba(220,38,38,.12);   color: var(--wrong); }
  .c-tag--gray   { background: rgba(107,114,128,.12); color: var(--muted); }

  /* 모바일: two-col → 1열로 전환 */
  @media (max-width: 480px) { .c-two-col { grid-template-columns: 1fr; } }

  .c-table-wrap { overflow-x: auto; margin: 10px 0; }
  .c-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; background: #f3f5fb; border-radius: 8px; overflow: hidden; }
  .c-table thead tr { background: #dde5f5; }
  .c-table thead th { padding: 8px 12px; text-align: left; font-size: 0.76rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .c-table tbody td { padding: 8px 12px; border-top: 1px solid var(--border); color: #3a4358; vertical-align: top; }
  .c-table tbody tr:hover { background: rgba(91,141,238,.05); }
  .c-td-g { color: var(--correct); font-weight: 600; }
  .c-td-r { color: var(--wrong); font-weight: 600; }
  .c-td-b { color: var(--accent); font-weight: 600; }

  /* ── 모바일: c-table → 카드형 변환 (480px 이하) ── */
  @media (max-width: 480px) {
    .c-table-wrap { overflow-x: visible; }
    .c-table, .c-table tbody { display: block; width: 100%; }
    .c-table thead { display: none; }           /* 헤더 행 숨김 */
    .c-table tbody tr {
      display: block;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      background: #fff;
    }
    .c-table tbody td {
      display: block;
      padding: 8px 12px;
      border-top: none;
      border-bottom: 1px solid rgba(0,0,0,.06);
      word-break: keep-all;                     /* 한글 단어 단위 줄바꿈 */
      line-height: 1.6;
    }
    .c-table tbody td:last-child { border-bottom: none; }

<script>
/* ============================================================
   PMP 학습 뷰어 — 데이터 기반 (data/[단원명].json 을 로드하여 렌더링)
   - 요구사항 1~7 + 제안 기능(F10 점프 인덱스, F11 북마크, F18 다시풀기) 구현
   - 상태(북마크/완료/풀이 클릭 기록)는 localStorage에 단원별로 저장되어 새로고침 후에도 유지됨
   - Google 로그인 시 Firestore와 동기화되어, 다른 기기에서도 동일한 진행상태를 이어볼 수 있음
   ============================================================ */

// ── 자동 버전 체크 & 강제 새로고침 ──────────────────────────────
// version.json을 항상 새로 fetch해서 저장된 버전과 비교.
// 새 버전이면 ?_v=... 쿼리를 붙여 reload → 브라우저 캐시 우회.
(async function autoUpdate() {
  // 이미 ?_v= 파라미터로 재진입한 경우 무한루프 방지
  if (location.search.includes('_v=')) {
    const p = new URLSearchParams(location.search);
    localStorage.setItem('pmp_ver', p.get('_v'));
    // URL을 깔끔하게 정리 (히스토리 교체)
    const clean = location.pathname + (location.hash || '');
    history.replaceState(null, '', clean);
    return;
  }
  try {
    const res = await fetch('version.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const { v } = await res.json();
    const stored = localStorage.getItem('pmp_ver');
    if (stored && stored !== v) {
      // 새 버전 감지 → 캐시 무효화 URL로 교체 로드
      localStorage.setItem('pmp_ver', v);
      location.replace(location.pathname + '?_v=' + encodeURIComponent(v) + (location.hash || ''));
    } else {
      localStorage.setItem('pmp_ver', v);
    }
  } catch (e) { /* 오프라인이면 조용히 무시 */ }
})();

// ── Firebase 초기화 (Auth + Firestore) ──
// ※ Firestore 콘솔 "규칙(Rules)" 탭에는 아래 규칙을 게시해 둘 것

//   rules_version = '2';

// 전체 단원 목록 (단원 이동 네비게이션용). 파일명은 "[단원명].json" 형태로 data/ 폴더에 위치.
const UNITS = [

  // TODO: 나머지 단원들이 추가되는 대로 이 배열에 추가하면 상단 네비게이션에 자동 반영됨

const STORAGE_PREFIX = "pmpViewerState::";

let currentUnit = null;
let unitData = null;
let conceptMap = {};   // conceptId -> concept object
let stateStore = {};   // qid -> { revealed: [choiceId,...], bookmarked: bool, done: bool }

// ── 언어 표시 모드 ('ko' = 한글만, 'both' = 한글+영어) ─────────────────
let langMode = localStorage.getItem('pmp_lang_mode') || 'both';

function applyLangMode() {

// ── 학습 모드 (개념을 선지 위에 미리 표시) ──────────────────────────
let studyMode = localStorage.getItem('pmp_study_mode') === '1';

// ── 진입점 ──
init();

function init() {
  // URL 쿼리 파라미터(?unit=...)로 단원을 지정할 수 있게 하고, 없으면 첫 번째 단원
  const params = new URLSearchParams(window.location.search);

  buildUnitNav();
  loadUnit(currentUnit);

  window.addEventListener('scroll', () => {

  // 상단 단원 이동 네비게이션의 실제 높이를 측정해 --nav-height로 반영
  // → 문제 바로가기(jump-index) 바가 그 바로 아래에 정확히 고정(sticky)되도록 함
  syncNavHeight();
  window.addEventListener('resize', syncNavHeight);

function syncNavHeight() {
  const nav = document.getElementById('unitNav');
  const head = document.getElementById('stickyHead');
  const navH = nav ? nav.offsetHeight : 0;
  const headH = head ? head.offsetHeight : 0;
  document.documentElement.style.setProperty('--nav-height', navH + 'px');
  // 단원명 + 진행률 + 문제 바로가기까지 모두 고정되므로,
  // F10으로 점프할 때 카드가 그 아래에 가려지지 않도록 스크롤 여백을 합산해 둔다.
  document.documentElement.style.setProperty('--scroll-offset', (navH + headH + 16) + 'px');
}

// ── 문제 바로가기(jump-index) 좌우 끝 호버 자동 스크롤 ──
// 스크롤바 대신, 좌/우 끝 영역에 마우스를 올려두면 그 방향으로 자동으로 부드럽게 이동한다.
function setupJumpIndexEdgeScroll(scrollEl, edgeLeft, edgeRight) {
  const SPEED = 6; // px / tick
  let rafId = null;
  let dir = 0;

  function tick() {
    if (dir !== 0) {
      scrollEl.scrollLeft += dir * SPEED;
      updateEdgeVisibility();
      rafId = requestAnimationFrame(tick);
    }
  }
  function start(direction) {
    dir = direction;
    if (rafId === null) rafId = requestAnimationFrame(tick);
  }
  function stop() {
    dir = 0;
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  }
  function updateEdgeVisibility() {
    const maxScroll = scrollEl.scrollWidth - scrollEl.clientWidth;
    edgeLeft.classList.toggle('disabled', scrollEl.scrollLeft <= 1);
    edgeRight.classList.toggle('disabled', scrollEl.scrollLeft >= maxScroll - 1);
  }

  edgeLeft.addEventListener('mouseenter', () => start(-1));
  edgeLeft.addEventListener('mouseleave', stop);
  edgeRight.addEventListener('mouseenter', () => start(1));
  edgeRight.addEventListener('mouseleave', stop);

  // 스크롤할 내용이 없으면 좌우 호버 영역을 아예 숨김
  function refresh() {
    const scrollable = scrollEl.scrollWidth > scrollEl.clientWidth + 1;
    edgeLeft.style.display = scrollable ? '' : 'none';
    edgeRight.style.display = scrollable ? '' : 'none';
    updateEdgeVisibility();
  }
  refresh();
  window.addEventListener('resize', refresh);
  scrollEl.addEventListener('scroll', updateEdgeVisibility);
}

// ── 요구사항 6: 상단 단원 이동 네비게이션 구성 (드롭박스 방식) ──
// 단원 수가 많아 가로로 펼쳐 두면 폭이 너무 길어지므로,
// <select> 드롭박스에서 단원을 선택하면 바로 해당 단원으로 이동하도록 구성한다.
function buildUnitNav() {
  const select = document.getElementById('unitSelect');
  select.innerHTML = '';

  UNITS.forEach((unitName, idx) => {
    const opt = document.createElement('option');
    opt.value = unitName;
    opt.textContent = `${idx + 1}. ${unitName}`;
    if (unitName === currentUnit) opt.selected = true;
    select.appendChild(opt);
  });

  select.addEventListener('change', () => {
    const unitName = select.value;
    if (unitName === currentUnit) return;
    const url = new URL(window.location.href);
    url.searchParams.set('unit', unitName);
    window.history.pushState({}, '', url);
    currentUnit = unitName;
    updateUnitSelectCurrent();
    loadUnit(unitName);
  });

  updateUnitSelectCurrent();
}

function updateUnitSelectCurrent() {
  const idx = UNITS.indexOf(currentUnit);
  const label = document.getElementById('unitSelectCurrent');
  if (label) label.textContent = idx >= 0 ? `(${idx + 1} / ${UNITS.length})` : '';
}

// ── 단원 데이터(JSON) + 개념 모듈(JSON) 로드 ──
// Firestore 문서 ID는 "/" 를 포함할 수 없으므로, 단원명에 "/"가 들어간 경우
// 마이그레이션 시 저장한 파일명 규칙과 동일하게 "_"로 치환해 ID를 맞춘다.
// 예: "Plan and Manage Quality of Products/deliverables" → "...Products_deliverables"
function unitDocId(unitName) {
  return unitName.replace(/\//g, '_');
}

// ── Firestore 문서 스키마 정규화 ──
// Firestore에는 아래 세 가지 스키마가 혼재합니다. 모든 패턴을 동일한 뷰어 형식으로 통일합니다.
//
// [패턴 O] 구버전 (세션 1~6, 원본 마이그레이션)
//   doc.unit = { unit:"이름", questions:[{id:"Q1", en:"...", ko:"...", choices:[{id:"A",en,ko,correct,explanation}], answer:["A"], ...}] }
//
// [패턴 A] 신버전+구구조 (세션 7~23): doc.unit = { unit:"이름", questions:[{id:숫자, question_en, question_ko, choices:[{key,text_en,text_ko}], answer:[..] or "A", ...}] }
//
// [패턴 B] 신버전+신구조 (세션 23~25): doc.unit = "이름"(문자열), doc.questions = [{id:숫자, question_en, ...}]
//
// 공통 목표:  q.id → "Q{n}" 문자열, q.en/ko 존재, q.answer → 배열, choices → {id,en,ko,correct,explanation}
function normalizeUnitDoc(doc) {
  // ── 1) questions 원본 배열 + unit 메타 추출 ──
  let unitName, rawQuestions, unitIndex, totalUnits;
  if (typeof doc.unit === 'object' && doc.unit !== null && Array.isArray(doc.unit.questions)) {
    // 패턴 O / A
    unitName    = doc.unit.unit || '';
    unitIndex   = doc.unit.unitIndex;
    totalUnits  = doc.unit.totalUnits;
    rawQuestions = doc.unit.questions;
  } else if (Array.isArray(doc.questions)) {
    // 패턴 B
    unitName    = typeof doc.unit === 'string' ? doc.unit : '';
    rawQuestions = doc.questions;
  } else {
    throw new Error('알 수 없는 Firestore 문서 스키마입니다.');
  }

  // ── 2) 모든 질문을 뷰어 형식으로 정규화 ──
  // 어떤 패턴이든 id·answer·choices 타입을 반드시 보정해 뷰어가 크래시 나지 않도록 한다.
  const normalizedQuestions = rawQuestions.map(q => {
    // answer 배열 확보 (문자열 "A"/"A,B" 또는 이미 배열)
    const answers = typeof q.answer === 'string'
      ? q.answer.split(',').map(s => s.trim()).filter(Boolean)
      : (Array.isArray(q.answer) ? q.answer : []);

    // id → 항상 "Q{n}" 형식 문자열
    const rawId  = q.id;
    const strId  = typeof rawId === 'number' ? `Q${rawId}`
                 : (typeof rawId === 'string' && rawId.match(/^\d+$/) ? `Q${rawId}` : String(rawId || ''));
    const qid    = strId.match(/^Q\d+$/) ? strId : strId;   // 이미 "Q1" 형태면 그대로

    // en / ko 텍스트 확보 (구버전: q.en, 신버전: q.question_en)
    const en = q.en || q.question_en || '';
    const ko = q.ko || q.question_ko || '';

    // choices 정규화
    // choice_explanations: 배열([{key,explanation_ko}]) 또는 객체({A:{...}}) 모두 지원
    const _expLookup = (() => {
      const ce = q.choice_explanations;
      if (!ce) return null;
      if (Array.isArray(ce)) return Object.fromEntries(ce.map(e => [e.key, e]));
      return ce;
    })();
    const choices = (q.choices || []).map(c => {
      const key    = c.key || c.id || '';
      const expObj = _expLookup && _expLookup[key];
      return {
        id          : key,
        en          : c.text_en  || c.en  || '',
        ko          : c.text_ko  || c.ko  || '',
        correct     : answers.includes(key),
        explanation : expObj
                      ? (expObj.explanation_ko || expObj.explanation || expObj.text || '')
                      : (c.explanation || c.explanation_ko || '')
      };
    });

    return {
      id           : qid,
      en           : en,
      ko           : ko,
      multi        : q.multi || false,
      answerCount  : answers.length,
      answer       : answers,
      solution_en  : q.solution_en  || '',
      solution_ko  : q.solution_ko  || '',
      source       : q.source       || '',
      conceptIds   : q.conceptIds   || [],
      choices      : choices
    };
  });

  return {
    unit       : unitName,
    unitIndex  : unitIndex,
    totalUnits : totalUnits,
    questions  : normalizedQuestions
  };
}

async function loadUnit(unitName) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">데이터를 불러오는 중입니다…</div>';
  document.getElementById('unitTitle').textContent = `⚙️ ${unitName}`;
  document.getElementById('unitSubtitle').textContent = '';

  // 문제 데이터는 Firestore(units/{단원ID})에 저장되어 있으며,
  // 보안 규칙상 로그인한 사용자만 읽을 수 있다 — 외부에 원본 JSON이 노출되지 않도록 하기 위함.
  if (!currentUser) {
    content.innerHTML = `<div class="error-box">🔒 이 단원의 문제를 보려면 로그인이 필요합니다.<br>
      <span style="font-size:0.85rem; color:var(--muted);">우측 상단의 <b>Google로 로그인</b> 버튼을 눌러주세요.</span></div>`;
    return;
  }

  stateStore = await loadState(unitName);

  try {
    const snap = await db.collection('units').doc(unitDocId(unitName)).get();
    if (!snap.exists) throw new Error('해당 단원의 데이터를 찾을 수 없습니다 (Firestore에 등록되지 않음)');

    const doc = snap.data();
    // 두 가지 Firestore 스키마를 통일된 형식으로 정규화
    unitData = normalizeUnitDoc(doc);

    // 개념 모듈은 선택 사항 — 없어도 뷰어는 정상 동작
    // 구버전: doc.concepts = { concepts:[...] }  /  신버전: doc.concepts = [...]
    // 신버전 개념 모듈은 html 대신 content 필드를 사용하므로 html로 매핑
    conceptMap = {};
    const conceptData = doc.concepts;
    if (conceptData) {
      const list = Array.isArray(conceptData) ? conceptData : (conceptData.concepts || []);
      list.forEach(c => {
        conceptMap[c.id] = Object.assign({}, c, { html: c.html || c.content || null });
      });
    }

    render();
  } catch (err) {
    content.innerHTML = `<div class="error-box">⚠️ ${unitName} 데이터를 불러오지 못했습니다.<br>${err.message}<br>
      <span style="font-size:0.8rem; color:var(--muted);">로그인 상태와 네트워크 연결을 확인해주세요.</span></div>`;
  }
}

// ── 화면 렌더링 ──
function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  // 단원 제목/부제 → sticky 밖 .unit-info에 세팅 (스크롤하면 자연히 올라감)
  document.getElementById('unitTitle').textContent = `⚙️ ${unitData.unit}`;
  document.getElementById('unitSubtitle').textContent =
    `${unitData.unitIndex ? `단원 ${unitData.unitIndex}/${unitData.totalUnits} · ` : ''}총 ${unitData.questions.length}문항 — 지문을 클릭하면 정답/오답과 해설이 함께 나타납니다`;

  // sticky-head: 이전 렌더링 내용 제거 후 다시 채움
  const stickyHead = document.getElementById('stickyHead');
  stickyHead.querySelectorAll('.progress-wrap, .jump-index-wrap').forEach(el => el.remove());

  // 진행률 표시줄
  const progressWrap = document.createElement('div');
  progressWrap.className = 'progress-wrap';
  progressWrap.innerHTML = `
    <span class="prog-label-text">진행률</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span id="progressText"></span>
    <button class="reset-all-btn" id="resetAllBtn" title="이 단원의 모든 문제 풀이 기록 초기화 후 다시 풀기">↺<span class="btn-text"> 전체 문제 다시 풀기</span></button>`;

  // 학습 모드 토글 버튼
  const studyBtn = document.createElement('button');
  studyBtn.className = 'study-mode-btn';
  studyBtn.id = 'studyModeBtn';
  studyBtn.addEventListener('click', toggleStudyMode);
  progressWrap.appendChild(studyBtn);

  // 언어 토글 버튼 (한글 / 한글+영어)
  const langWrap = document.createElement('div');
  langWrap.className = 'lang-btn-wrap';
  langWrap.innerHTML = `
    <button class="lang-btn" data-lang="ko" title="한국어만 표시">한글</button>
    <button class="lang-btn" data-lang="both" title="한국어 + 영어 표시">한글+영어</button>`;
  langWrap.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLangMode(btn.dataset.lang));
  });
  progressWrap.appendChild(langWrap);

  stickyHead.appendChild(progressWrap);
  document.getElementById('resetAllBtn').addEventListener('click', resetAllQuestions);

  // 학습 모드 + 언어 모드 상태 즉시 반영
  applyStudyMode();
  applyLangMode();

  // F10: 점프 인덱스 — 좌우 끝에 마우스를 올리면 자동으로 스크롤되는 방식
  const jumpWrap = document.createElement('div');
  jumpWrap.className = 'jump-index-wrap';

  const jumpIndex = document.createElement('div');
  jumpIndex.className = 'jump-index';
  jumpIndex.id = 'jumpIndex';
  jumpIndex.innerHTML = `<span class="jlabel">🔖 문제 바로가기</span>`;
  unitData.questions.forEach(q => {
    const b = document.createElement('button');
    b.className = 'jump-btn';
    b.dataset.jump = q.id;
    b.textContent = String(q.id).replace(/^Q/, '');
    b.title = String(q.id);
    b.addEventListener('click', () => jumpTo(q.id));
    jumpIndex.appendChild(b);
  });

  const edgeLeft = document.createElement('div');
  edgeLeft.className = 'jump-edge left';
  edgeLeft.dataset.dir = '-1';
  edgeLeft.textContent = '‹';
  edgeLeft.title = '왼쪽으로 이동';

  const edgeRight = document.createElement('div');
  edgeRight.className = 'jump-edge right';
  edgeRight.dataset.dir = '1';
  edgeRight.textContent = '›';
  edgeRight.title = '오른쪽으로 이동';

  jumpWrap.appendChild(edgeLeft);
  jumpWrap.appendChild(jumpIndex);
  jumpWrap.appendChild(edgeRight);

  // 안내 문구는 가로 스크롤 줄 밖, 별도의 줄로 분리해 표시
  const hint = document.createElement('span');
  hint.className = 'jump-hint';
  hint.textContent = '녹색 = 풀이 완료 · ★ = 북마크 · 좌우 끝에 마우스를 올리면 자동 이동';
  jumpWrap.appendChild(hint);

  stickyHead.appendChild(jumpWrap);

  setupJumpIndexEdgeScroll(jumpIndex, edgeLeft, edgeRight);

  // 문제 카드들
  unitData.questions.forEach(q => content.appendChild(buildQuestionCard(q)));

  // 저장된 상태 복원 (새로고침 후에도 유지)
  restoreAllStates();
  updateGlobalProgress();

  // sticky-head 높이가 단원마다 달라질 수 있으므로 다시 측정해 동기화
  syncNavHeight();
}

// ── 문제 카드 생성 ──
function buildQuestionCard(q) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.dataset.qid = q.id;

  // 헤더
  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `
    <span class="q-num">${q.id}</span>
    ${q.multi ? `<span class="multi-tag">복수선택 ${q.answerCount || q.answer.length}개</span>` : ''}
    <span class="q-status" data-status>0/${q.choices.length} 선택지 확인됨</span>
    <div class="q-tools">
      <button class="tool-btn bookmark" data-bookmark title="복습할 문제로 표시">☆ 북마크</button>
      <button class="tool-btn reset" data-reset title="클릭 상태 초기화 후 다시 풀기">↺ 다시풀기</button>
    </div>
  `;
  card.appendChild(header);

  // 본문
  const body = document.createElement('div');
  body.className = 'q-body';

  const bilingual = document.createElement('div');
  bilingual.className = 'bilingual';
  bilingual.innerHTML = `<span class="label">문제</span><div class="en">${escapeHtml(q.en)}</div><div class="ko">${escapeHtml(q.ko)}</div>`;
  body.appendChild(bilingual);

  const choicesWrap = document.createElement('div');
  choicesWrap.className = 'choices';
  q.choices.forEach(choice => {
    const el = document.createElement('div');
    el.className = 'choice';
    el.dataset.choiceId = choice.id;
    el.dataset.correct = choice.correct ? 'true' : 'false';
    el.innerHTML = `
      <div class="choice-header">
        <span class="badge">${choice.id}</span>
        <span class="mark"></span>
        <div class="choice-text">
          <div class="en">${escapeHtml(choice.en)}</div>
          <div class="ko">${escapeHtml(choice.ko)}</div>
        </div>
        <span class="reveal-hint">클릭하여 확인 ▾</span>
      </div>
      <div class="exp-content ${choice.correct ? 'correct-exp' : 'wrong-exp'}">${escapeHtml(choice.explanation || '')}</div>
    `;
    el.addEventListener('click', () => revealChoice(card, q, el, choice));
    choicesWrap.appendChild(el);
  });
  body.appendChild(choicesWrap);

  // 정답 표시줄 (요구사항 2)
  const answerBar = document.createElement('div');
  answerBar.className = 'answer-bar';
  answerBar.dataset.answerbar = '';
  answerBar.textContent = `정답: ${(q.answer || []).join(', ')}`;
  body.appendChild(answerBar);

  // 원문 해설 박스 (요구사항 3)
  const solutionBox = document.createElement('div');
  solutionBox.className = 'solution-box';
  solutionBox.dataset.solution = '';
  solutionBox.innerHTML = `
    <div class="stitle">📌 원문 해설 요약</div>
    <div class="original-en">${escapeHtml(q.solution_en || '')}</div>
    <div class="original-ko">${escapeHtml(q.solution_ko || '')}</div>
    <div class="source">출처: ${escapeHtml(q.source || '')}</div>
  `;
  body.appendChild(solutionBox);

  card.appendChild(body);

  // 추가 개념정리 모듈 (요구사항 5)
  card.appendChild(buildConceptModule(q));

  // 도구 버튼 이벤트 연결
  header.querySelector('[data-bookmark]').addEventListener('click', (e) => toggleBookmark(card, q, e.currentTarget));
  header.querySelector('[data-reset]').addEventListener('click', () => resetQuestion(card, q));

  return card;
}

// ── 개념정리 모듈 영역 빌드 (conceptIds로 매칭된 카드를 렌더링, 없으면 안내문 표시) ──
function buildConceptModule(q) {
  const wrap = document.createElement('div');
  wrap.className = 'concept-module';
  wrap.dataset.concept = '';

  const ids = q.conceptIds || [];
  const matched = ids.map(id => conceptMap[id]).filter(Boolean);

  if (matched.length === 0) {
    wrap.innerHTML = `
      <div class="ctitle">🧩 추가 개념정리</div>
      <div class="cbody concept-placeholder">
        ${ids.length
          ? `※ 연결된 개념 모듈(${ids.join(', ')})이 아직 concepts/${unitData.unit}.concepts.json 에 작성되지 않았습니다.`
          : `※ 이 문제에 연결된 별도 개념정리 모듈이 아직 없습니다.`}
      </div>`;
  } else {
    let html = `<div class="ctitle">🧩 추가 개념정리</div><div class="cbody">`;
    matched.forEach(c => {
      // 'html' 필드가 있으면 구조화된 리치 콘텐츠(정의박스/표/박스/다이어그램)를 그대로 렌더링,
      // 없으면 'summary' 평문을 단락으로 표시 (구버전 호환)
      if (c.html) {
        html += `<div class="concept-block"><div class="concept-block-title">${escapeHtml(c.title || c.id)}</div>${c.html}</div>`;
      } else {
        html += `<div class="concept-block"><div class="concept-block-title">${escapeHtml(c.title || c.id)}</div><p class="c-p">${escapeHtml(c.summary || c.body || '')}</p></div>`;
      }
    });
    html += `</div>`;
    wrap.innerHTML = html;

    // 모바일 카드형 변환용: <th> 텍스트를 각 <td>의 data-label로 복사
    // CSS ::before { content: attr(data-label) } 로 열 이름을 카드 안에 표시
    wrap.querySelectorAll('.c-table').forEach(table => {
      const headers = [...table.querySelectorAll('thead th')].map(th => th.textContent.trim());
      table.querySelectorAll('tbody tr').forEach(tr => {
        [...tr.querySelectorAll('td')].forEach((td, i) => {
          if (headers[i]) td.dataset.label = headers[i];
        });
      });
    });
  }
  return wrap;
}

// ── 요구사항 1·2: 클릭 시 선택지 공개 (정답/오답 + 해설 동시 표시) ──
function revealChoice(card, q, el, choice) {
  if (el.classList.contains('revealed')) return;

  const isCorrect = choice.correct === true;
  el.classList.add('revealed', isCorrect ? 'is-correct' : 'is-wrong');

  const allChoices = card.querySelectorAll('.choice');
  const revealed = card.querySelectorAll('.choice.revealed');
  card.querySelector('[data-status]').textContent = `${revealed.length}/${allChoices.length} 선택지 확인됨`;

  // 상태 저장
  const st = getQState(q.id);
  if (!st.revealed.includes(choice.id)) st.revealed.push(choice.id);

  // 요구사항 3: 모든 선택지를 클릭하면 정답 표시줄 + 원문 해설 등장
  if (revealed.length === allChoices.length) {
    card.querySelector('[data-answerbar]').classList.add('show');
    card.querySelector('[data-solution]').classList.add('show');
    card.querySelector('[data-concept]').classList.add('show');
    card.querySelector('[data-solution]').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    st.done = true;
    const jumpBtn = document.querySelector(`.jump-btn[data-jump="${q.id}"]`);
    if (jumpBtn) jumpBtn.classList.add('done');
  }

  saveState();
  updateGlobalProgress();
}

// F10: 문제 번호 클릭 시 해당 문제로 스크롤 이동
function jumpTo(qid) {
  const card = document.querySelector(`.q-card[data-qid="${qid}"]`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// F11: 북마크 토글 (점프 인덱스에도 ★ 동기화, localStorage에 저장되어 새로고침 후 유지)
function toggleBookmark(card, q, btn) {
  btn.classList.toggle('active');
  const isActive = btn.classList.contains('active');
  btn.textContent = isActive ? '★ 북마크됨' : '☆ 북마크';

  const jumpBtn = document.querySelector(`.jump-btn[data-jump="${q.id}"]`);
  if (jumpBtn) jumpBtn.classList.toggle('bookmarked', isActive);

  const st = getQState(q.id);
  st.bookmarked = isActive;
  saveState();
}

// F18: 문제 다시 풀기 — 클릭 상태/해설/원문해설 모두 초기화
function resetQuestion(card, q) {
  card.querySelectorAll('.choice').forEach(c => c.classList.remove('revealed', 'is-correct', 'is-wrong'));
  card.querySelector('[data-answerbar]').classList.remove('show');
  card.querySelector('[data-solution]').classList.remove('show');
  card.querySelector('[data-concept]').classList.remove('show');

  const allChoices = card.querySelectorAll('.choice');
  card.querySelector('[data-status]').textContent = `0/${allChoices.length} 선택지 확인됨`;

  const jumpBtn = document.querySelector(`.jump-btn[data-jump="${q.id}"]`);
  if (jumpBtn) jumpBtn.classList.remove('done');

  const st = getQState(q.id);
  st.revealed = [];
  st.done = false;
  saveState();

  updateGlobalProgress();
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 전체 문제 다시 풀기 — 현재 단원의 모든 문제 풀이 기록(클릭 상태/해설/원문해설/개념정리/완료표시)을 한 번에 초기화
// (북마크는 사용자가 따로 표시해 둔 복습 표식이므로 유지함)
function resetAllQuestions() {
  if (!confirm(`"${unitData.unit}" 단원의 모든 문제 풀이 기록을 초기화하고 처음부터 다시 풉니다.\n(북마크 표시는 유지됩니다)\n계속할까요?`)) return;

  Object.keys(stateStore).forEach(qid => {
    const st = stateStore[qid];
    st.revealed = [];
    st.done = false;
  });
  saveState();

  document.querySelectorAll('.q-card').forEach(card => {
    card.querySelectorAll('.choice').forEach(c => c.classList.remove('revealed', 'is-correct', 'is-wrong'));
    card.querySelector('[data-answerbar]').classList.remove('show');
    card.querySelector('[data-solution]').classList.remove('show');
    card.querySelector('[data-concept]').classList.remove('show');
    const allChoices = card.querySelectorAll('.choice');
    card.querySelector('[data-status]').textContent = `0/${allChoices.length} 선택지 확인됨`;
  });

  document.querySelectorAll('.jump-btn').forEach(b => b.classList.remove('done'));

  updateGlobalProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 전체 진행률(progress bar) 갱신 ──
function updateGlobalProgress() {
  const allChoices = document.querySelectorAll('.choice');
  const revealed = document.querySelectorAll('.choice.revealed');
  const pct = allChoices.length ? Math.round((revealed.length / allChoices.length) * 100) : 0;
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  if (fill) fill.style.width = pct + '%';
  if (text) text.innerHTML = `<span class="prog-count">${revealed.length}/${allChoices.length}</span><span class="prog-suffix"> 선택지 확인</span>`;
}

// ============================================================
// 상태 저장/복원
//  - 기본 저장소: localStorage (단원별로 분리 저장, 새로고침해도 유지, 오프라인에서도 동작)
//  - 로그인 시: Firestore(users/{uid}/unitStates/{단원명})에도 함께 저장되어
//    다른 기기에서 로그인하면 동일한 진행상태(완료/북마크/풀이기록)를 이어볼 수 있음
//  - 로컬과 클라우드 데이터가 둘 다 있으면 더 최근에 수정된 쪽(updatedAt)을 사용 (마지막 수정 우선)
// 향후 학습 어플 마이그레이션 시 이 stateStore 구조를 그대로 서버/로컬DB 스키마로 옮길 수 있음
// ============================================================
function getQState(qid) {
  if (!stateStore[qid]) stateStore[qid] = { revealed: [], bookmarked: false, done: false };
  return stateStore[qid];
}

// 로컬 캐시는 { data: stateStore, updatedAt: <ms> } 형태로 감싸 저장하여
// 클라우드와 비교해 어느 쪽이 더 최근인지 판단할 수 있게 한다.
function readLocalCache(unitName) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + unitName);
    if (!raw) return { data: {}, updatedAt: 0 };
    const parsed = JSON.parse(raw);
    // 과거 버전(=stateStore를 그대로 저장)과의 호환: data/updatedAt 래퍼가 없으면 그대로 data로 취급
    if (parsed && typeof parsed === 'object' && parsed.data && typeof parsed.updatedAt === 'number') {
      return parsed;
    }
    return { data: parsed || {}, updatedAt: 0 };
  } catch (e) { return { data: {}, updatedAt: 0 }; }
}

function writeLocalCache(unitName, data, updatedAt) {
  try {
    localStorage.setItem(STORAGE_PREFIX + unitName, JSON.stringify({ data, updatedAt }));
  } catch (e) { /* localStorage 사용 불가 — 무시 (상태는 세션 내에서만 유지) */ }
}

// 단원의 풀이 상태를 불러온다 — 로컬과(로그인 시) 클라우드를 비교해 더 최신 데이터를 사용
async function loadState(unitName) {
  const local = readLocalCache(unitName);

  if (currentUser) {
    setSyncBadge('syncing');
    try {
      const snap = await unitDocRef(unitName).get();
      if (snap.exists) {
        const cloud = snap.data() || {};
        const cloudUpdatedAt = (cloud.updatedAt && cloud.updatedAt.toMillis) ? cloud.updatedAt.toMillis() : (cloud.updatedAtMs || 0);
        if (cloudUpdatedAt >= local.updatedAt) {
          setSyncBadge('synced');
          // 클라우드 데이터를 로컬 캐시에도 반영해 다음에 오프라인이어도 최신 상태 유지
          writeLocalCache(unitName, cloud.data || {}, cloudUpdatedAt);
          return cloud.data || {};
        }
      }
      setSyncBadge('synced');
    } catch (e) {
      console.warn('클라우드 진행상태를 불러오지 못했습니다 — 이 기기에 저장된 데이터를 사용합니다.', e);
      setSyncBadge('offline');
    }
  }
  return local.data;
}

// 풀이 상태를 저장한다 — localStorage에는 즉시, Firestore에는(로그인 시) 디바운스하여 비동기로 저장
function saveState() {
  const updatedAt = Date.now();
  writeLocalCache(currentUnit, stateStore, updatedAt);

  if (!currentUser) return;

  // 클릭할 때마다 Firestore에 쓰면 호출이 너무 잦으므로, 짧은 시간 안의 변경은 묶어서 한 번만 전송
  if (cloudSyncTimer) clearTimeout(cloudSyncTimer);
  setSyncBadge('syncing');
  const unitAtSaveTime = currentUnit;
  cloudSyncTimer = setTimeout(() => {
    unitDocRef(unitAtSaveTime).set({
      data: stateStore,
      updatedAtMs: updatedAt,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => setSyncBadge('synced'))
      .catch(err => {
        console.warn('클라우드 동기화 실패 — 이 기기에는 정상 저장되었습니다.', err);
        setSyncBadge('offline');
      });
  }, 800);
}

// 저장된 상태를 화면에 다시 적용 (새로고침 후에도 클릭 기록·북마크·완료 표시 복원)
function restoreAllStates() {
  Object.keys(stateStore).forEach(qid => {
    const st = stateStore[qid];
    const card = document.querySelector(`.q-card[data-qid="${qid}"]`);
    if (!card) return;

    // 공개된 선택지 복원
    (st.revealed || []).forEach(choiceId => {
      const el = card.querySelector(`.choice[data-choice-id="${choiceId}"]`);
      if (el && !el.classList.contains('revealed')) {
        const isCorrect = el.dataset.correct === 'true';
        el.classList.add('revealed', isCorrect ? 'is-correct' : 'is-wrong');
      }
    });
    const allChoices = card.querySelectorAll('.choice');
    const revealed = card.querySelectorAll('.choice.revealed');
    card.querySelector('[data-status]').textContent = `${revealed.length}/${allChoices.length} 선택지 확인됨`;

    if (st.done || revealed.length === allChoices.length) {
      card.querySelector('[data-answerbar]').classList.add('show');
      card.querySelector('[data-solution]').classList.add('show');
      card.querySelector('[data-concept]').classList.add('show');
      const jumpBtn = document.querySelector(`.jump-btn[data-jump="${qid}"]`);
      if (jumpBtn) jumpBtn.classList.add('done');
    }

    if (st.bookmarked) {
      const bm = card.querySelector('[data-bookmark]');
      bm.classList.add('active');
      bm.textContent = '★ 북마크됨';
      const jumpBtn = document.querySelector(`.jump-btn[data-jump="${qid}"]`);
      if (jumpBtn) jumpBtn.classList.add('bookmarked');
    }
  });
}

// ── XSS 방지를 위한 간단한 이스케이프 (데이터는 신뢰하지만 안전하게 처리) ──
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
